<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CardRemind" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>CardRemind</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #c8f564;
      --accent2: #64c8f5;
      --danger: #f56464;
      --warn: #f5c864;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      padding: 56px 24px 24px;
      padding-top: max(56px, calc(env(safe-area-inset-top) + 20px));
      background: linear-gradient(180deg, #0d0d14 0%, transparent 100%);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .app-title span {
      color: var(--accent);
      font-style: italic;
    }

    .add-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      color: #0a0a0f;
      font-weight: bold;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .add-btn:active { transform: scale(0.92); opacity: 0.85; }

    /* SUMMARY STRIP */
    .summary {
      display: flex;
      gap: 12px;
      padding: 16px 24px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .summary::-webkit-scrollbar { display: none; }

    .summary-chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-chip b { color: var(--text); font-weight: 500; }
    .summary-chip.urgent { border-color: var(--danger); }
    .summary-chip.urgent b { color: var(--danger); }

    /* MAIN CONTENT */
    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: 4px;
    }

    /* CARD ITEM */
    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent2);
      border-radius: 3px 0 0 3px;
    }
    .card-item.urgent::before { background: var(--danger); }
    .card-item.soon::before { background: var(--warn); }
    .card-item.paid::before { background: var(--muted); opacity: 0.4; }
    .card-item.paid { opacity: 0.5; }
    .card-item:active { background: var(--surface2); transform: scale(0.99); }

    .card-color-dot {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .card-due {
      text-align: right;
      flex-shrink: 0;
    }
    .due-days {
      font-size: 22px;
      font-family: 'DM Serif Display', serif;
      line-height: 1;
    }
    .due-days.urgent { color: var(--danger); }
    .due-days.soon { color: var(--warn); }
    .due-days.ok { color: var(--accent); }
    .due-days.paid { color: var(--muted); }
    .due-label { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 13px; line-height: 1.6; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px;
      padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px));
      width: 100%;
      animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--accent); }

    .emoji-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .emoji-opt {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface2);
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .emoji-opt.selected { border-color: var(--accent); background: rgba(200,245,100,0.1); }

    .color-picker {
      display: flex;
      gap: 8px;
    }
    .color-opt {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-opt.selected { border-color: white; transform: scale(1.15); }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(245,100,100,0.15); color: var(--danger); border: 1px solid rgba(245,100,100,0.3); }

    /* DETAIL MODAL */
    .detail-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      margin: 4px 0;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }
    .detail-cell {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
    }
    .detail-cell-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .detail-cell-val { font-size: 16px; }
    .detail-cell-val.urgent { color: var(--danger); }
    .detail-cell-val.warn { color: var(--warn); }
    .detail-cell-val.ok { color: var(--accent); }

    /* NOTIFICATION BANNER */
    .notif-banner {
      margin: 0 24px 0;
      padding: 12px 16px;
      background: rgba(200,245,100,0.08);
      border: 1px solid rgba(200,245,100,0.2);
      border-radius: 10px;
      font-size: 12px;
      color: var(--accent);
      display: none;
      align-items: center;
      gap: 10px;
    }
    .notif-banner.show { display: flex; }
    .notif-banner button {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      margin-left: auto;
      white-space: nowrap;
    }

    select.form-input { appearance: none; -webkit-appearance: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">Card<span>Remind</span></div>
    </div>
    <button class="add-btn" onclick="openAddModal()">+</button>
  </div>
</div>

<div class="notif-banner" id="notifBanner">
  🔔 Enable notifications to get due-date reminders
  <button onclick="requestNotifications()">Enable</button>
</div>

<div class="summary" id="summary"></div>

<div class="content" id="content">
  <div class="empty">
    <div class="empty-icon">💳</div>
    <div class="empty-title">No cards yet</div>
    <div class="empty-sub">Tap <strong>+</strong> to add your first<br/>credit card payment reminder</div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event, 'addModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Card</div>

    <div class="form-group">
      <label class="form-label">Card Name</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Chase Sapphire" />
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="emoji-picker" id="emojiPicker">
        <!-- filled by JS -->
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due Day (of month)</label>
        <input class="form-input" id="f-day" type="number" min="1" max="31" placeholder="e.g. 15" />
      </div>
      <div class="form-group">
        <label class="form-label">Min. Amount Due</label>
        <input class="form-input" id="f-amount" type="number" placeholder="e.g. 250" inputmode="decimal" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Currency</label>
      <select class="form-input" id="f-currency">
        <option value="$">USD ($)</option>
        <option value="RM">MYR (RM)</option>
        <option value="€">EUR (€)</option>
        <option value="£">GBP (£)</option>
        <option value="¥">JPY (¥)</option>
        <option value="S$">SGD (S$)</option>
        <option value="₱">PHP (₱)</option>
        <option value="₩">KRW (₩)</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event, 'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
      <div id="d-icon" style="font-size:36px;"></div>
      <div>
        <div class="modal-title" id="d-name" style="margin-bottom:0;"></div>
        <div style="font-size:12px; color:var(--muted);">Credit Card</div>
      </div>
    </div>

    <div class="detail-amount" id="d-amount"></div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:4px;">minimum payment</div>

    <div class="detail-grid">
      <div class="detail-cell">
        <div class="detail-cell-label">Due Date</div>
        <div class="detail-cell-val" id="d-duedate"></div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">Days Left</div>
        <div class="detail-cell-val" id="d-daysleft"></div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">Status</div>
        <div class="detail-cell-val" id="d-status"></div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">Next Cycle</div>
        <div class="detail-cell-val" id="d-next"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-danger" onclick="deleteCard()">Delete</button>
      <button class="btn btn-secondary" onclick="editCard()">Edit</button>
      <button class="btn btn-primary" id="d-markpaid" onclick="togglePaid()">Mark Paid</button>
    </div>
  </div>
</div>

<script>
  const EMOJIS = ['💳','🏦','💰','🏧','🌟','💎','🔵','🟣','🟠','🟡','✈️','🛍️'];
  const COLORS = ['#c8f564','#64c8f5','#f5c864','#f56464','#c864f5','#64f5c8'];

  let cards = [];

  // ── IndexedDB storage (shared with service worker) ──────────────────────
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('cardremind-db', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject();
    });
  }

  async function saveCards(data) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(data, 'cards');
      tx.oncomplete = res;
      tx.onerror = rej;
    });
  }

  async function loadCards() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readonly');
      const req = tx.objectStore('kv').get('cards');
      req.onsuccess = () => res(req.result || []);
      req.onerror = rej;
    });
  }
  let editingId = null;
  let viewingId = null;
  let selectedEmoji = EMOJIS[0];

  function save() {
    saveCards(cards).catch(console.error);
    // Tell SW to check reminders after any save
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'CHECK_REMINDERS' });
    }
  }

  function getDaysUntilDue(dayOfMonth) {
    const today = new Date();
    const thisMonth = new Date(today.getFullYear(), today.getMonth(), dayOfMonth);
    const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, dayOfMonth);
    let target = thisMonth >= today ? thisMonth : nextMonth;
    const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function getDueDate(dayOfMonth) {
    const today = new Date();
    const thisMonth = new Date(today.getFullYear(), today.getMonth(), dayOfMonth);
    const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, dayOfMonth);
    const target = thisMonth >= today ? thisMonth : nextMonth;
    return target.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function getCurrentCycleKey(dayOfMonth) {
    // Each card's "cycle" starts on its due day each month.
    // If today is before the due day, the cycle belongs to last month.
    // e.g. due day 15: cycle key is "2026-05" if today >= 15th, else "2026-04"
    const today = new Date();
    const d = today.getDate();
    const m = today.getMonth();
    const y = today.getFullYear();
    if (d >= dayOfMonth) {
      return `${y}-${String(m + 1).padStart(2, '0')}`;
    } else {
      const prevMonth = m === 0 ? 11 : m - 1;
      const prevYear  = m === 0 ? y - 1 : y;
      return `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}`;
    }
  }

  function isPaidThisCycle(card) {
    if (!card.paidCycle) return false;
    return card.paidCycle === getCurrentCycleKey(card.day);
  }

  function getStatus(card) {
    if (isPaidThisCycle(card)) return 'paid';
    const days = getDaysUntilDue(card.day);
    if (days <= 3) return 'urgent';
    if (days <= 7) return 'soon';
    return 'ok';
  }

  function render() {
    const content = document.getElementById('content');
    const summary = document.getElementById('summary');

    if (cards.length === 0) {
      content.innerHTML = `<div class="empty">
        <div class="empty-icon">💳</div>
        <div class="empty-title">No cards yet</div>
        <div class="empty-sub">Tap <strong>+</strong> to add your first<br/>credit card payment reminder</div>
      </div>`;
      summary.innerHTML = '';
      return;
    }

    const sorted = [...cards].sort((a,b) => getDaysUntilDue(a.day) - getDaysUntilDue(b.day));
    const urgent = sorted.filter(c => getStatus(c) === 'urgent').length;
    const unpaid = sorted.filter(c => getStatus(c) !== 'paid').length;
    const totalDue = sorted.filter(c => getStatus(c) !== 'paid').reduce((s,c) => s + (Number(c.amount)||0), 0);
    const currency = sorted[0]?.currency || '$';

    summary.innerHTML = `
      <div class="summary-chip ${urgent>0?'urgent':''}"><b>${urgent}</b> urgent</div>
      <div class="summary-chip"><b>${unpaid}</b> unpaid</div>
      <div class="summary-chip"><b>${currency}${totalDue.toLocaleString()}</b> due</div>
      <div class="summary-chip"><b>${cards.length}</b> cards</div>
    `;

    content.innerHTML = '';

    const urgentCards = sorted.filter(c => getStatus(c) === 'urgent');
    const soonCards = sorted.filter(c => getStatus(c) === 'soon');
    const okCards = sorted.filter(c => getStatus(c) === 'ok');
    const paidCards = sorted.filter(c => getStatus(c) === 'paid');

    function renderGroup(label, list) {
      if (!list.length) return;
      content.innerHTML += `<div class="section-label">${label}</div>`;
      list.forEach(card => {
        const status = getStatus(card);
        const days = getDaysUntilDue(card.day);
        const daysLabel = status === 'paid' ? '✓' : (days === 0 ? 'TODAY' : `${days}`);
        const daysClass = status === 'paid' ? 'paid' : (status === 'urgent' ? 'urgent' : status === 'soon' ? 'soon' : 'ok');
        content.innerHTML += `
          <div class="card-item ${status}" onclick="openDetail('${card.id}')">
            <div class="card-color-dot" style="background:${card.color}22;">${card.emoji}</div>
            <div class="card-info">
              <div class="card-name">${card.name}</div>
              <div class="card-meta">
                <span>${card.currency}${Number(card.amount).toLocaleString()} due</span>
                <span>·</span>
                <span>Day ${card.day}</span>
              </div>
            </div>
            <div class="card-due">
              <div class="due-days ${daysClass}">${daysLabel}</div>
              <div class="due-label">${status==='paid'?'paid':days===0?'due today':'days left'}</div>
            </div>
          </div>`;
      });
    }

    if (urgentCards.length) renderGroup('🔴 Due Soon', urgentCards);
    if (soonCards.length) renderGroup('🟡 This Week', soonCards);
    if (okCards.length) renderGroup('🟢 Upcoming', okCards);
    if (paidCards.length) renderGroup('✓ Paid This Cycle', paidCards);
  }

  function openAddModal() {
    editingId = null;
    selectedEmoji = EMOJIS[0];
    document.getElementById('modalTitle').textContent = 'Add Card';
    document.getElementById('f-name').value = '';
    document.getElementById('f-day').value = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('f-currency').value = '$';
    renderEmojiPicker();
    document.getElementById('addModal').classList.add('open');
  }

  function renderEmojiPicker() {
    document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
      `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`
    ).join('');
  }

  function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiPicker();
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  function handleOverlayClick(e, id) {
    if (e.target === e.currentTarget) closeModal(id);
  }

  function saveCard() {
    const name = document.getElementById('f-name').value.trim();
    const day = parseInt(document.getElementById('f-day').value);
    const amount = document.getElementById('f-amount').value;
    const currency = document.getElementById('f-currency').value;

    if (!name || !day || day < 1 || day > 31) {
      alert('Please enter a valid card name and due day (1-31).');
      return;
    }

    if (editingId) {
      const idx = cards.findIndex(c => c.id === editingId);
      if (idx !== -1) {
        cards[idx] = { ...cards[idx], name, day, amount, currency, emoji: selectedEmoji };
      }
    } else {
      cards.push({
        id: Date.now().toString(),
        name, day, amount, currency,
        emoji: selectedEmoji,
        color: COLORS[cards.length % COLORS.length],
        paidCycle: null
      });
    }

    save();
    render();
    closeModal('addModal');
    scheduleNotifications();
  }

  function openDetail(id) {
    viewingId = id;
    const card = cards.find(c => c.id === id);
    if (!card) return;

    const status = getStatus(card);
    const days = getDaysUntilDue(card.day);

    document.getElementById('d-icon').textContent = card.emoji;
    document.getElementById('d-name').textContent = card.name;
    document.getElementById('d-amount').textContent = `${card.currency}${Number(card.amount).toLocaleString()}`;
    document.getElementById('d-duedate').textContent = getDueDate(card.day);

    const dlEl = document.getElementById('d-daysleft');
    dlEl.textContent = status === 'paid' ? 'Paid ✓' : (days === 0 ? 'Today!' : `${days} days`);
    dlEl.className = 'detail-cell-val ' + (status==='urgent'?'urgent':status==='soon'?'warn':status==='paid'?'':'ok');

    const stEl = document.getElementById('d-status');
    stEl.textContent = status === 'paid' ? '✓ Paid' : status === 'urgent' ? '⚠️ Urgent' : status === 'soon' ? '⏳ Soon' : '✅ On Track';
    stEl.className = 'detail-cell-val ' + (status==='urgent'?'urgent':status==='soon'?'warn':status==='paid'?'':'ok');

    document.getElementById('d-next').textContent = getDueDate(card.day);

    const btn = document.getElementById('d-markpaid');
    btn.textContent = status === 'paid' ? 'Mark Unpaid' : 'Mark Paid';

    document.getElementById('detailModal').classList.add('open');
  }

  function togglePaid() {
    const card = cards.find(c => c.id === viewingId);
    if (!card) return;
    if (isPaidThisCycle(card)) {
      card.paidCycle = null;
    } else {
      card.paidCycle = getCurrentCycleKey(card.day);
    }
    save();
    render();
    closeModal('detailModal');
  }

  function editCard() {
    const card = cards.find(c => c.id === viewingId);
    if (!card) return;
    closeModal('detailModal');
    editingId = card.id;
    selectedEmoji = card.emoji;
    document.getElementById('modalTitle').textContent = 'Edit Card';
    document.getElementById('f-name').value = card.name;
    document.getElementById('f-day').value = card.day;
    document.getElementById('f-amount').value = card.amount;
    document.getElementById('f-currency').value = card.currency;
    renderEmojiPicker();
    document.getElementById('addModal').classList.add('open');
  }

  function deleteCard() {
    if (!confirm('Delete this card?')) return;
    cards = cards.filter(c => c.id !== viewingId);
    save();
    render();
    closeModal('detailModal');
  }

  // NOTIFICATIONS
  function checkNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default' && cards.length > 0) {
      document.getElementById('notifBanner').classList.add('show');
    }
  }

  async function requestNotifications() {
    const perm = await Notification.requestPermission();
    document.getElementById('notifBanner').classList.remove('show');
    if (perm === 'granted') scheduleNotifications();
  }

  async function scheduleNotifications() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;

    // Register periodic background sync (fires ~daily even when app is closed)
    if ('periodicSync' in navigator.serviceWorker) {
      try {
        const reg = await navigator.serviceWorker.ready;
        await reg.periodicSync.register('daily-reminder', { minInterval: 24 * 60 * 60 * 1000 });
      } catch (e) { /* periodicSync not supported, fallback below */ }
    }

    // Fallback: ask SW to fire reminders right now
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'CHECK_REMINDERS' });
    }
  }

  // SERVICE WORKER
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // INIT — load cards from IndexedDB, then render
  loadCards().then(stored => {
    cards = stored;
    render();
    checkNotifPermission();
    // Re-trigger reminders check on app open
    if (Notification.permission === 'granted' && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'CHECK_REMINDERS' });
    }
  }).catch(() => {
    // Fallback to localStorage for old data migration
    const old = localStorage.getItem('cc-cards');
    if (old) {
      try { cards = JSON.parse(old); saveCards(cards); localStorage.removeItem('cc-cards'); } catch {}
    }
    render();
    checkNotifPermission();
  });
</script>
</body>
</html>
