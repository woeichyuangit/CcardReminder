<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CardRemind" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>CardRemind</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0d1117; color: #fff; font-family: 'Space Mono', monospace; min-height: 100dvh; padding-bottom: calc(env(safe-area-inset-bottom) + 24px); }

    .header { padding: max(52px, calc(env(safe-area-inset-top) + 16px)) 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .app-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .app-name span { color: #e8ff47; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .add-btn { width: 38px; height: 38px; border: 1px solid rgba(232,255,71,0.4); background: rgba(232,255,71,0.08); color: #e8ff47; font-size: 22px; font-weight: 700; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; font-family: 'Syne', sans-serif; }
    .add-btn:active { background: rgba(232,255,71,0.18); }

    /* Sync indicator */
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #30d158; flex-shrink: 0; }
    .sync-dot.syncing { background: #ffd60a; animation: pulse 1s infinite; }
    .sync-dot.error { background: #ff4d4d; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .summary-bar { display: grid; grid-template-columns: 1fr 1fr; margin: 20px 20px 0; border: 1px solid rgba(255,255,255,0.07); }
    .sum-panel { padding: 14px 18px; }
    .sum-panel:first-child { border-right: 1px solid rgba(255,255,255,0.07); background: rgba(255,107,107,0.06); }
    .sum-panel:last-child { background: rgba(48,209,88,0.06); }
    .sum-label { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
    .sum-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; }
    .sum-value.red { color: #ff6b6b; }
    .sum-value.green { color: #30d158; }

    .list { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .section-title { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: -2px; }

    .cc-tile { border-radius: 0; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .cc-top-section { padding: 20px 20px 16px; position: relative; overflow: hidden; }
    .cc-top-section .deco1 { position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .cc-top-section .deco2 { position: absolute; bottom: -20px; right: 20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .cc-tile.c0 .cc-top-section { background: linear-gradient(135deg,#1a1a2e 0%,#e94560 100%); }
    .cc-tile.c1 .cc-top-section { background: linear-gradient(135deg,#16213e 0%,#0f3460 100%); }
    .cc-tile.c2 .cc-top-section { background: linear-gradient(135deg,#0f3460 0%,#533483 100%); }
    .cc-tile.c3 .cc-top-section { background: linear-gradient(135deg,#1b4332 0%,#40916c 100%); }
    .cc-tile.c4 .cc-top-section { background: linear-gradient(135deg,#370617 0%,#e85d04 100%); }
    .cc-tile.c5 .cc-top-section { background: linear-gradient(135deg,#240046 0%,#7b2d8b 100%); }

    .cc-header-row { display: flex; justify-content: space-between; align-items: flex-start; position: relative; }
    .cc-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
    .cc-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; line-height: 1.2; }
    .cc-number { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.45); margin: 14px 0 10px; }
    .cc-meta-row { display: flex; justify-content: space-between; align-items: flex-end; position: relative; }
    .cc-balance-block .cc-bal-label { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
    .cc-balance-block .cc-bal-amt { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; }
    .cc-min { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 2px; }
    .cc-days-block { text-align: right; }
    .cc-days-num { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 2px; display: inline-block; letter-spacing: 0.5px; }
    .cc-days-num.overdue   { background: rgba(255,77,77,0.2);   color: #ff4d4d; border: 1px solid rgba(255,77,77,0.4); }
    .cc-days-num.due-soon  { background: rgba(255,149,0,0.15);  color: #ff9500; border: 1px solid rgba(255,149,0,0.35); }
    .cc-days-num.this-week { background: rgba(255,214,10,0.12); color: #ffd60a; border: 1px solid rgba(255,214,10,0.3); }
    .cc-days-num.upcoming  { background: rgba(48,209,88,0.1);   color: #30d158; border: 1px solid rgba(48,209,88,0.3); }
    .cc-days-num.paid      { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.12); }
    .cc-due-on { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 4px; }

    .cc-btn-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.25); flex-wrap: wrap; }
    .btn-ghost { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 7px 14px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; transition: background .12s; }
    .btn-ghost:active { background: rgba(255,255,255,0.08); }
    .btn-ghost.paid-btn { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.35); }
    .btn-ghost.mark-paid { border-color: rgba(48,209,88,0.5); color: #30d158; }
    .btn-ghost.mark-paid:active { background: rgba(48,209,88,0.1); }
    .btn-danger { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 7px 14px; border-radius: 2px; border: 1px solid rgba(255,77,77,0.35); background: rgba(255,77,77,0.08); color: #ff6b6b; cursor: pointer; }
    .btn-danger:active { background: rgba(255,77,77,0.18); }

    .cc-tile.paid-tile .cc-top-section { opacity: 0.55; }

    .empty { text-align: center; padding: 72px 24px; color: rgba(255,255,255,0.3); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .empty-sub { font-size: 12px; line-height: 1.7; letter-spacing: 0.5px; }

    /* Loading */
    .loading { text-align: center; padding: 60px 24px; color: rgba(255,255,255,0.3); }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid rgba(232,255,71,0.15); border-top-color: #e8ff47; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #0d1117; border: 1px solid rgba(232,255,71,0.2); width: 100%; max-width: 440px; padding: 28px; animation: fadeIn .2s ease; max-height: 90dvh; overflow-y: auto; }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .modal-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 24px; letter-spacing: 1px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.45); }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }
    .fields-stack { display: flex; flex-direction: column; gap: 14px; }
    .input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #fff; font-family: 'Space Mono', monospace; font-size: 14px; padding: 10px 12px; border-radius: 2px; outline: none; width: 100%; transition: border-color .15s; -webkit-appearance: none; }
    .input:focus { border-color: rgba(232,255,71,0.5); }
    select.input { appearance: none; }

    .color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .cswatch { width: 32px; height: 32px; border-radius: 2px; border: 2px solid transparent; cursor: pointer; transition: transform .12s, border-color .12s; }
    .cswatch.sel { border-color: #e8ff47; transform: scale(1.1); }
    .cswatch.s0 { background: linear-gradient(135deg,#1a1a2e,#e94560); }
    .cswatch.s1 { background: linear-gradient(135deg,#16213e,#0f3460); }
    .cswatch.s2 { background: linear-gradient(135deg,#0f3460,#533483); }
    .cswatch.s3 { background: linear-gradient(135deg,#1b4332,#40916c); }
    .cswatch.s4 { background: linear-gradient(135deg,#370617,#e85d04); }
    .cswatch.s5 { background: linear-gradient(135deg,#240046,#7b2d8b); }

    .modal-btn-row { display: flex; gap: 10px; margin-top: 24px; }
    .modal-btn { flex: 1; padding: 12px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; border-radius: 2px; border: none; cursor: pointer; transition: opacity .12s; }
    .modal-btn:active { opacity: 0.8; }
    .modal-btn-primary { background: #e8ff47; color: #0d1117; }
    .modal-btn-cancel { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); }

    .notif-banner { margin: 16px 20px 0; padding: 10px 14px; border: 1px solid rgba(232,255,71,0.2); background: rgba(232,255,71,0.04); font-size: 11px; color: rgba(232,255,71,0.8); letter-spacing: 0.5px; display: none; align-items: center; gap: 10px; }
    .notif-banner.show { display: flex; }
    .notif-banner button { margin-left: auto; background: rgba(232,255,71,0.15); color: #e8ff47; border: 1px solid rgba(232,255,71,0.3); padding: 4px 12px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <div class="app-name">Card<span>Remind</span></div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
    <button class="add-btn" onclick="openAdd()">+</button>
  </div>
</div>

<div class="notif-banner" id="notifBanner">
  🔔 ENABLE PAYMENT REMINDERS
  <button onclick="requestNotif()">ENABLE</button>
</div>

<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="sum-panel">
    <div class="sum-label">DUE THIS MONTH</div>
    <div class="sum-value red" id="sumDue">—</div>
  </div>
  <div class="sum-panel">
    <div class="sum-label">PAID THIS MONTH</div>
    <div class="sum-value green" id="sumPaid">0/0</div>
  </div>
</div>

<div class="list" id="list">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div style="font-size:11px;letter-spacing:1px;">LOADING FROM CLOUD...</div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="addModal" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add New Card</div>
    <div class="modal-sub">Fill in your credit card details</div>
    <div class="fields-stack">
      <div class="field"><div class="field-label">CARD NICKNAME *</div><input class="input" id="f-name" type="text" placeholder="e.g. Maybank Visa" /></div>
      <div class="field"><div class="field-label">LAST 4 DIGITS</div><input class="input" id="f-last4" type="text" maxlength="4" placeholder="1234" inputmode="numeric" /></div>
      <div class="field-row">
        <div class="field"><div class="field-label">DUE DAY *</div><input class="input" id="f-day" type="number" min="1" max="31" placeholder="15" /></div>
        <div class="field"><div class="field-label">CURRENCY</div>
          <select class="input" id="f-currency">
            <option value="RM">MYR (RM)</option>
            <option value="$">USD ($)</option>
            <option value="S$">SGD (S$)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
            <option value="₱">PHP (₱)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><div class="field-label">OUTSTANDING BALANCE</div><input class="input" id="f-balance" type="number" placeholder="5000" inputmode="decimal" /></div>
        <div class="field"><div class="field-label">MIN. PAYMENT</div><input class="input" id="f-minpay" type="number" placeholder="250" inputmode="decimal" /></div>
      </div>
      <div class="field"><div class="field-label">CARD COLOR</div><div class="color-grid" id="colorGrid"></div></div>
    </div>
    <div class="modal-btn-row">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn modal-btn-primary" onclick="saveCard()">SAVE CARD</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAryr-3RdZxNEA2dorchvuoCdonemAkZr4",
  authDomain: "cardremind-358c5.firebaseapp.com",
  projectId: "cardremind-358c5",
  storageBucket: "cardremind-358c5.firebasestorage.app",
  messagingSenderId: "1001565844177",
  appId: "1:1001565844177:web:f6d58d8c62611a8e024bf0"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const REF  = doc(db, 'cardremind', 'userdata'); // single document stores all cards

let cards  = [];
let editId = null;
let selColor = 0;

// ── Sync dot ───────────────────────────────────────────────────────────
const syncDot = document.getElementById('syncDot');
function setSyncing() { syncDot.className = 'sync-dot syncing'; }
function setSynced()  { syncDot.className = 'sync-dot'; }
function setSyncErr() { syncDot.className = 'sync-dot error'; }

// ── Save to Firestore ──────────────────────────────────────────────────
async function persist() {
  setSyncing();
  try {
    await setDoc(REF, { cards });
    setSynced();
    // Also update local cache
    localStorage.setItem('cc-cards-cache', JSON.stringify(cards));
    navigator.serviceWorker?.controller?.postMessage({ type: 'CHECK_REMINDERS' });
  } catch(e) {
    setSyncErr();
    console.error('Save failed:', e);
    // Fallback: save to localStorage
    localStorage.setItem('cc-cards-cache', JSON.stringify(cards));
  }
}

// ── Load from Firestore ────────────────────────────────────────────────
async function loadFromFirebase() {
  setSyncing();
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) {
      cards = snap.data().cards || [];
    } else {
      // First time — migrate from localStorage if any
      const cached = localStorage.getItem('cc-cards-cache') || localStorage.getItem('cc-cards');
      if (cached) {
        cards = JSON.parse(cached);
        await persist(); // push old data to Firebase
      } else {
        cards = [];
      }
    }
    setSynced();
  } catch(e) {
    setSyncErr();
    // Offline fallback — use local cache
    const cached = localStorage.getItem('cc-cards-cache');
    cards = cached ? JSON.parse(cached) : [];
  }
  render();
  checkNotif();
}

// ── Real-time listener (auto-updates if another device changes data) ───
function startListener() {
  onSnapshot(REF, (snap) => {
    if (snap.exists()) {
      cards = snap.data().cards || [];
      localStorage.setItem('cc-cards-cache', JSON.stringify(cards));
      render();
      setSynced();
    }
  }, () => setSyncErr());
}

// ── Helpers ────────────────────────────────────────────────────────────
function daysUntil(day) {
  const t=new Date(), tm=new Date(t.getFullYear(),t.getMonth(),day), nm=new Date(t.getFullYear(),t.getMonth()+1,day);
  return Math.ceil(((tm>=t?tm:nm)-t)/86400000);
}
function dueDateStr(day) {
  const t=new Date(), tm=new Date(t.getFullYear(),t.getMonth(),day), nm=new Date(t.getFullYear(),t.getMonth()+1,day);
  return (tm>=t?tm:nm).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function currentMonth() { const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`; }
function isPaid(c) { return (c.paidMonths||[]).includes(currentMonth()); }
function getStatus(c) {
  if(isPaid(c)) return 'paid';
  const d=daysUntil(c.day);
  if(d<=0) return 'overdue';
  if(d<=3) return 'due-soon';
  if(d<=7) return 'this-week';
  return 'upcoming';
}
function daysLabel(c) {
  const st=getStatus(c), d=daysUntil(c.day);
  if(st==='paid')   return '✓ PAID';
  if(d===0)         return 'TODAY';
  if(d<0)           return `${Math.abs(d)}D OVERDUE`;
  return `${d}D — ${{ 'due-soon':'DUE SOON','this-week':'THIS WEEK','upcoming':'UPCOMING' }[st]}`;
}

// ── Render ─────────────────────────────────────────────────────────────
function render() {
  const list=document.getElementById('list'), bar=document.getElementById('summaryBar');
  if(!cards.length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">💳</div><div class="empty-title">No cards yet</div><div class="empty-sub">Tap + to add your<br/>first credit card</div></div>`;
    bar.style.display='none'; return;
  }
  bar.style.display='grid';
  const unpaid=cards.filter(c=>!isPaid(c));
  const totalDue=unpaid.reduce((s,c)=>s+(Number(c.balance)||0),0);
  const cur=cards[0]?.currency||'RM';
  document.getElementById('sumDue').textContent=totalDue>0?`${cur} ${totalDue.toLocaleString()}`:'—';
  document.getElementById('sumPaid').textContent=`${cards.filter(isPaid).length}/${cards.length}`;

  const sorted=[...cards].sort((a,b)=>daysUntil(a.day)-daysUntil(b.day));
  list.innerHTML='';

  [
    {key:'overdue',   label:'OVERDUE'},
    {key:'due-soon',  label:'DUE SOON'},
    {key:'this-week', label:'THIS WEEK'},
    {key:'upcoming',  label:'UPCOMING'},
    {key:'paid',      label:'PAID THIS MONTH'},
  ].forEach(({key,label})=>{
    const grp=sorted.filter(c=>getStatus(c)===key);
    if(!grp.length) return;
    list.innerHTML+=`<div class="section-title">${label}</div>`;
    grp.forEach(c=>{
      const st=getStatus(c), paid=isPaid(c);
      const num=c.last4?`•••• •••• •••• ${c.last4}`:'•••• •••• •••• ••••';
      const balStr=c.balance?`${c.currency} ${Number(c.balance).toLocaleString()}`:'—';
      const minStr=c.minPayment?`MIN. ${c.currency} ${Number(c.minPayment).toLocaleString()}`:'';
      list.innerHTML+=`
        <div class="cc-tile c${c.colorIdx||0} ${paid?'paid-tile':''}">
          <div class="cc-top-section">
            <div class="deco1"></div><div class="deco2"></div>
            <div class="cc-header-row">
              <div><div class="cc-label">CREDIT CARD</div><div class="cc-name">${c.name}</div></div>
              <svg width="38" height="29" viewBox="0 0 38 29" fill="none">
                <rect x=".5" y=".5" width="37" height="28" rx="4" fill="#c8a96e" stroke="#a07840"/>
                <line x1="0" y1="10" x2="38" y2="10" stroke="#a07840" stroke-width=".9"/>
                <line x1="0" y1="19" x2="38" y2="19" stroke="#a07840" stroke-width=".9"/>
                <line x1="13" y1="0" x2="13" y2="29" stroke="#a07840" stroke-width=".9"/>
                <line x1="25" y1="0" x2="25" y2="29" stroke="#a07840" stroke-width=".9"/>
              </svg>
            </div>
            <div class="cc-number">${num}</div>
            <div class="cc-meta-row">
              <div class="cc-balance-block">
                <div class="cc-bal-label">BALANCE</div>
                <div class="cc-bal-amt">${balStr}</div>
                ${minStr?`<div class="cc-min">${minStr}</div>`:''}
              </div>
              <div class="cc-days-block">
                <div class="cc-days-num ${st}">${daysLabel(c)}</div>
                <div class="cc-due-on">DUE ${dueDateStr(c.day).toUpperCase()}</div>
              </div>
            </div>
          </div>
          <div class="cc-btn-row">
            <button class="btn-ghost ${paid?'paid-btn':'mark-paid'}" onclick="window._togglePaid('${c.id}')">${paid?'↩ MARK UNPAID':'✓ MARK PAID'}</button>
            <button class="btn-ghost" onclick="window._openEdit('${c.id}')">EDIT</button>
            <button class="btn-danger" onclick="window._deleteCard('${c.id}')">DELETE</button>
          </div>
        </div>`;
    });
  });
}

// ── Actions ────────────────────────────────────────────────────────────
window._togglePaid = async (id) => {
  const c=cards.find(x=>x.id===id); if(!c) return;
  if(!c.paidMonths) c.paidMonths=[];
  const cm=currentMonth();
  c.paidMonths=isPaid(c)?c.paidMonths.filter(m=>m!==cm):[...c.paidMonths,cm];
  render(); await persist();
};

window._deleteCard = async (id) => {
  if(!confirm('Delete this card?')) return;
  cards=cards.filter(c=>c.id!==id);
  render(); await persist();
};

window._openEdit = (id) => {
  const c=cards.find(x=>x.id===id); if(!c) return;
  editId=id; selColor=c.colorIdx||0;
  document.getElementById('modalTitle').textContent='Edit Card';
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-last4').value=c.last4||'';
  document.getElementById('f-day').value=c.day;
  document.getElementById('f-currency').value=c.currency||'RM';
  document.getElementById('f-balance').value=c.balance||'';
  document.getElementById('f-minpay').value=c.minPayment||'';
  renderColors();
  document.getElementById('addModal').classList.add('open');
};

// ── Add / Edit ─────────────────────────────────────────────────────────
window.openAdd = () => {
  editId=null; selColor=0;
  document.getElementById('modalTitle').textContent='Add New Card';
  ['name','last4','day','balance','minpay'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-currency').value='RM';
  renderColors();
  document.getElementById('addModal').classList.add('open');
};

function renderColors() {
  document.getElementById('colorGrid').innerHTML=Array.from({length:6},(_,i)=>
    `<div class="cswatch s${i} ${i===selColor?'sel':''}" onclick="window._pickColor(${i})"></div>`).join('');
}
window._pickColor = (i) => { selColor=i; renderColors(); };

window.saveCard = async () => {
  const name=document.getElementById('f-name').value.trim();
  const day=parseInt(document.getElementById('f-day').value);
  if(!name||!day||day<1||day>31){alert('Enter card name and due day (1–31)');return;}
  const patch={
    name, last4:document.getElementById('f-last4').value.trim().slice(-4),
    day, currency:document.getElementById('f-currency').value,
    balance:document.getElementById('f-balance').value,
    minPayment:document.getElementById('f-minpay').value,
    colorIdx:selColor,
  };
  if(editId){
    const i=cards.findIndex(c=>c.id===editId);
    if(i!==-1) cards[i]={...cards[i],...patch};
  } else {
    cards.push({id:Date.now().toString(),...patch,paidMonths:[]});
  }
  closeModal(); render(); await persist();
};

window.closeModal = () => document.getElementById('addModal').classList.remove('open');
window.bgClose = (e) => { if(e.target===e.currentTarget) closeModal(); };

// ── Notifications ──────────────────────────────────────────────────────
function checkNotif(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'&&cards.length>0)
    document.getElementById('notifBanner').classList.add('show');
}
window.requestNotif = async () => {
  const p=await Notification.requestPermission();
  document.getElementById('notifBanner').classList.remove('show');
  if(p==='granted'){
    try{const r=await navigator.serviceWorker.ready;await r.periodicSync.register('daily-reminder',{minInterval:86400000});}catch{}
    navigator.serviceWorker?.controller?.postMessage({type:'CHECK_REMINDERS'});
  }
};

// ── SW & Init ──────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
await loadFromFirebase();
startListener(); // live sync across devices
</script>
</body>
</html>
